name: VKOSPI Daily Alert

on:
  schedule:
    - cron: "3 0 * * 1-5"
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Send VKOSPI alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.VKOSPI_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.VKOSPI_CHAT_ID }}
        run: python scripts/vkospi_alert.py
